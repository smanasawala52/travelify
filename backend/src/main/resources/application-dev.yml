spring:
  datasource:
    url: jdbc:h2:mem:travelify;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    baseline-version: 0
    locations: classpath:db/migration

travelify:
  cors:
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173
  booking:
    allow-guest-booking: true
    create-account-automatically: true
