spring:
  application:
    name: travelify
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
    hibernate:
      # Schema owned by Flyway — do not auto-mutate
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

travelify:
  jwt:
    secret: ${JWT_SECRET:TravelifyDevSecretKeyThatIsLongEnoughForHS256Algorithm!!}
    access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:${JWT_EXPIRATION_MS:86400000}}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  # WP Travel–style booking identity options
  booking:
    allow-guest-booking: ${TRAVELIFY_ALLOW_GUEST_BOOKING:true}
    create-account-automatically: ${TRAVELIFY_CREATE_ACCOUNT_AUTOMATICALLY:true}

logging:
  level:
    com.travelify: INFO
    org.springframework.security: INFO
    org.flywaydb: INFO
