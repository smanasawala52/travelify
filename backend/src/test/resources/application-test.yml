spring:
  application:
    name: travelify-backend-test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
        jdbc:
          time_zone: UTC
  flyway:
    enabled: false

logging:
  level:
    org.springframework: WARN
    org.hibernate: WARN
    com.travelify: DEBUG

travelify:
  jwt:
    secret: test-secret-key-at-least-256-bits-long-12345678901234567890123456789012
    expiration: 86400000
    refresh-expiration: 604800000
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000
